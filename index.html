<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desk Oasis - Mobile Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a4a45, #0d2b28, #051413);
            font-family: 'Inter', sans-serif; user-select: none; 
            touch-action: none; /* PUMIPIGIL SA SCROLL AT PULL-TO-REFRESH SA PHONE */
            -webkit-user-select: none;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* --- GLASSMORPHISM BASE --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-radius: 20px; color: rgba(255, 255, 255, 0.8);
            z-index: 10; position: absolute; pointer-events: none;
        }

        /* --- TOOLTIP CSS --- */
        [data-tooltip] { position: relative; }
        [data-tooltip]::after {
            content: attr(data-tooltip); position: absolute;
            bottom: 130%; left: 50%; transform: translateX(-50%) translateY(5px);
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            color: #fff; padding: 6px 12px; border-radius: 6px;
            font-size: 0.75rem; font-weight: 300; letter-spacing: 0.5px;
            white-space: nowrap; opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100;
        }
        @media (hover: hover) { /* Tooltips only show on devices with mouse hover */
            [data-tooltip]:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* --- UI: HELP BUTTON & GUIDE --- */
        .help-btn {
            position: absolute; top: 40px; left: 40px;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8); font-size: 1.2rem; cursor: pointer;
            backdrop-filter: blur(10px); z-index: 20; transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); font-family: 'Inter', sans-serif;
        }
        .help-btn:active { transform: scale(0.95); }

        .info-panel { 
            top: 95px; left: 40px; padding: 20px 25px; width: 250px; 
            opacity: 0; transform: translateY(-10px); transition: all 0.3s ease;
        }
        .info-panel.active { opacity: 1; transform: translateY(0); pointer-events: all; }
        .info-panel h3 { margin: 0 0 10px 0; font-weight: 400; font-size: 1.1rem; color: #fff; letter-spacing: 1px;}
        .info-panel ul { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; font-weight: 300; line-height: 1.8; color: rgba(255,255,255,0.7); }
        .info-panel li span { display: inline-block; width: 25px; }

        /* --- UI: MODE TOGGLE (ICONS ONLY) --- */
        .mode-toggle {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px); border-radius: 35px;
            padding: 8px; border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 20; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .mode-btn {
            background: transparent; border: none; color: rgba(255, 255, 255, 0.5);
            width: 45px; height: 45px; border-radius: 50%; font-size: 1.3rem; 
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .mode-btn.active { background: rgba(255, 255, 255, 0.15); color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* --- UI: WIDGET --- */
        .widget-container { bottom: 40px; right: 40px; width: 280px; padding: 25px; }
        #time { font-size: 3rem; font-weight: 200; margin: 0; letter-spacing: 2px; color: rgba(255, 255, 255, 0.9); }
        #date { font-size: 0.9rem; font-weight: 400; margin-top: 5px; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; letter-spacing: 1px; }
        .divider { height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.2), transparent); margin: 15px 0; }
        #reminder { font-size: 1rem; font-weight: 300; letter-spacing: 0.5px; line-height: 1.4; color: #a8d5cc; transition: opacity 1s ease-in-out; }

        /* --- BREEDING MODAL --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 50; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            background: rgba(13, 43, 40, 0.85); backdrop-filter: blur(20px); 
            border: 1px solid rgba(168, 213, 204, 0.2); padding: 30px 40px; border-radius: 20px; 
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: translateY(20px); transition: transform 0.3s ease;
            width: 80%; max-width: 320px; /* Mobile friendly sizing */
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-box h2 { margin: 0 0 10px 0; font-weight: 300; color: #fff; letter-spacing: 1px;}
        .modal-box p { margin: 0 0 25px 0; color: #a8d5cc; font-weight: 300; font-size: 0.95rem; }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 10px 25px; border-radius: 30px; border: none; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-yes { background: #3e7a68; color: #fff; border: 1px solid #4a9e86; }
        .btn-yes:active { transform: scale(0.95); }
        .btn-no { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3); }
        .btn-no:active { background: rgba(255,255,255,0.1); }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .widget-container { width: auto; left: 20px; right: 20px; bottom: 110px; padding: 15px; }
            #time { font-size: 2.2rem; }
            .help-btn { top: 20px; left: 20px; }
            .info-panel { top: 75px; left: 20px; right: 20px; width: auto; }
            .mode-toggle { bottom: 20px; }
        }
    </style>
</head>
<body>

    <button id="btnHelp" class="help-btn" data-tooltip="View Pond Guide">?</button>
    
    <div id="guidePanel" class="glass-panel info-panel">
        <h3>Pond Guide</h3>
        <ul>
            <li><span>🖐</span> <strong>Interact:</strong> Drag fish or lilies.</li>
            <li><span>🍕</span> <strong>Feed:</strong> Tap to drop food.</li>
            <li><span>❤️</span> <strong>Breed:</strong> Drop a fish on another to mate.</li>
        </ul>
    </div>

    <div class="mode-toggle">
        <button id="btnModeInteract" class="mode-btn active" data-tooltip="Interact Mode">🖐</button>
        <button id="btnModeFeed" class="mode-btn" data-tooltip="Feed Mode">🍕</button>
    </div>

    <div class="glass-panel widget-container">
        <h1 id="time">00:00</h1>
        <p id="date">Monday, Jan 01</p>
        <div class="divider"></div>
        <div id="reminder">Take a deep breath and relax your shoulders.</div>
    </div>

    <div class="modal-overlay" id="breedModal">
        <div class="modal-box">
            <h2>Mate Koi?</h2>
            <p>She'll carry eggs for 2 mins, then lay them on a lily pad.</p>
            <div class="btn-group">
                <button class="btn btn-yes" id="btnBreedYes">Yes</button>
                <button class="btn btn-no" id="btnBreedNo">Cancel</button>
            </div>
        </div>
    </div>

    <canvas id="pondCanvas"></canvas>

    <script>
        // --- UI LOGIC ---
        let currentMode = 'interact'; 

        document.getElementById('btnHelp').addEventListener('click', () => {
            document.getElementById('guidePanel').classList.toggle('active');
        });

        document.getElementById('btnModeInteract').addEventListener('click', (e) => {
            currentMode = 'interact';
            e.currentTarget.classList.add('active');
            document.getElementById('btnModeFeed').classList.remove('active');
            document.body.style.cursor = 'default';
        });

        document.getElementById('btnModeFeed').addEventListener('click', (e) => {
            currentMode = 'feed';
            e.currentTarget.classList.add('active');
            document.getElementById('btnModeInteract').classList.remove('active');
            document.body.style.cursor = 'crosshair';
        });

        // --- GLOBALS & SETUP ---
        const canvas = document.getElementById('pondCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, draggedFish = null, draggedLily = null, isModalOpen = false, breedingParents = null;
        let mouseX = -1000, mouseY = -1000;

        const ripples = [], lilyPads = [], fishes = [], foods = [], bugs = [], eggClusters = [], raindrops = [];
        
        let isRaining = false; let rainIntensity = 0; let rainTimer = Math.random() * 1000 + 500;

        function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        for(let i = 0; i < 9; i++) {
            lilyPads.push({ 
                x: Math.random() * width, y: Math.random() * height, size: Math.random() * 50 + 40, angle: Math.random() * Math.PI * 2, notch: Math.random() * 0.5 + 0.2,
                vx: (Math.random() - 0.5) * 0.1, vy: (Math.random() - 0.5) * 0.1, vAngle: (Math.random() - 0.5) * 0.002
            });
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours(), minutes = now.getMinutes(), ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('time').innerText = `${hours}:${minutes} ${ampm}`;
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000); updateClock();

        const reminders = ["Posture check: Unhunch your back.","Take a sip of water.","Rest your eyes for a moment.","Listen to the rain if it falls.","Eggs take 3 minutes to hatch."];
        let reminderIndex = 0; const reminderEl = document.getElementById('reminder');
        setInterval(() => {
            reminderEl.style.opacity = 0;
            setTimeout(() => { reminderIndex = (reminderIndex + 1) % reminders.length; reminderEl.innerText = reminders[reminderIndex]; reminderEl.style.opacity = 1; }, 1000);
        }, 15000);

        function mixColors(c1, c2) {
            let mutate = () => Math.floor(Math.random() * 30 - 15);
            let r = Math.max(0, Math.min(255, Math.floor((c1.r + c2.r) / 2) + mutate()));
            let g = Math.max(0, Math.min(255, Math.floor((c1.g + c2.g) / 2) + mutate()));
            let b = Math.max(0, Math.min(255, Math.floor((c1.b + c2.b) / 2) + mutate()));
            return { r, g, b };
        }

        class Raindrop {
            constructor() {
                this.x = Math.random() * width; this.y = -20;
                this.length = Math.random() * 20 + 10; this.speed = Math.random() * 10 + 15;
            }
            update() {
                this.y += this.speed; this.x -= this.speed * 0.2; 
                if (this.y > height) {
                    if (Math.random() > 0.5) ripples.push({ x: this.x, y: this.y, radius: 1, alpha: 0.3 });
                    this.y = -20; this.x = Math.random() * width;
                }
            }
            draw() {
                ctx.beginPath(); ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 * rainIntensity})`;
                ctx.lineWidth = 1; ctx.moveTo(this.x, this.y); ctx.lineTo(this.x - this.length * 0.2, this.y + this.length); ctx.stroke();
            }
        }
        for(let i=0; i<100; i++) raindrops.push(new Raindrop()); 

        class WaterStrider {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.targetX = this.x; this.targetY = this.y;
                this.timer = 0; this.angle = 0;
            }
            update() {
                this.timer--;
                let distToMouse = Math.hypot(mouseX - this.x, mouseY - this.y);
                if (distToMouse < 150) {
                    this.timer = 0; 
                    let fleeAngle = Math.atan2(this.y - mouseY, this.x - mouseX);
                    this.targetX = this.x + Math.cos(fleeAngle) * 200; this.targetY = this.y + Math.sin(fleeAngle) * 200;
                }
                if(this.timer <= 0) {
                    if (distToMouse >= 150) { this.targetX = this.x + (Math.random() * 100 - 50); this.targetY = this.y + (Math.random() * 100 - 50); }
                    this.timer = Math.random() * 150 + 50; 
                    this.angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                    ripples.push({x: this.x, y: this.y, radius: 1, alpha: 0.2}); 
                }
                let moveSpeed = distToMouse < 150 ? 0.15 : 0.05; 
                this.x += (this.targetX - this.x) * moveSpeed; this.y += (this.targetY - this.y) * moveSpeed;
                if (this.x < 0) this.x = width; if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height; if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.fillStyle = 'rgba(200, 255, 200, 0.6)'; ctx.beginPath(); ctx.arc(0, 0, 1.5, 0, Math.PI*2); ctx.fill(); 
                ctx.strokeStyle = 'rgba(200, 255, 200, 0.4)'; ctx.lineWidth = 0.5;
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-4, 4); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-4, -4); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(4, 4); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(4, -4); ctx.stroke();
                ctx.restore();
            }
        }
        for(let i=0; i<8; i++) bugs.push(new WaterStrider());

        class EggCluster {
            constructor(parentLily, motherPrimary, motherSecondary, fatherPrimary, fatherSecondary) {
                this.parentLily = parentLily; this.framesUntilHatch = 10800; 
                this.genes = { mp: motherPrimary, ms: motherSecondary, fp: fatherPrimary, fs: fatherSecondary };
                this.eggs = []; let numEggs = Math.floor(Math.random() * 3) + 2;
                for(let i=0; i<numEggs; i++) this.eggs.push({ offsetX: (Math.random() - 0.5) * (parentLily.size * 0.6), offsetY: (Math.random() - 0.5) * (parentLily.size * 0.6) });
            }
            update() { this.framesUntilHatch--; if (this.framesUntilHatch <= 0) { this.hatch(); return true; } return false; }
            draw() {
                ctx.save(); ctx.translate(this.parentLily.x, this.parentLily.y);
                ctx.fillStyle = 'rgba(255, 255, 200, 0.8)'; ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 1;
                this.eggs.forEach(egg => { ctx.beginPath(); ctx.arc(egg.offsetX, egg.offsetY, 3, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); });
                ctx.restore();
            }
            hatch() {
                this.eggs.forEach(egg => {
                    let newPrimary = mixColors(this.genes.mp, this.genes.fp), newSecondary = mixColors(this.genes.ms, this.genes.fs);
                    let baby = new Koi(newPrimary, newSecondary, true);
                    baby.x = this.parentLily.x + egg.offsetX; baby.y = this.parentLily.y + egg.offsetY;
                    fishes.push(baby); ripples.push({x: baby.x, y: baby.y, radius: 5, alpha: 0.8});
                });
            }
        }

        class Koi {
            constructor(primaryRGB, secondaryRGB, isBaby = false) {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.angle = Math.random() * Math.PI * 2; this.baseSpeed = Math.random() * 0.4 + 0.4;
                this.primary = primaryRGB; this.secondary = secondaryRGB;
                this.targetSize = Math.random() * 0.3 + 0.6; this.size = isBaby ? 0.2 : this.targetSize; 
                this.growthRate = (this.targetSize - 0.2) / 36000; 
                this.swimCycle = Math.random() * 100; this.finCycle = Math.random() * 100;
                this.state = 'steady'; this.stateTimer = Math.random() * 200 + 100; this.currentSpeedMult = 1.0;
                this.isPregnant = false; this.pregnancyFrames = 0; this.widthMultiplier = 1.0; this.mateGenes = null;
            }

            makePregnant(fatherFish) { this.isPregnant = true; this.pregnancyFrames = 7200; this.mateGenes = { p: fatherFish.primary, s: fatherFish.secondary }; }
            layEggs() {
                this.isPregnant = false; this.widthMultiplier = 1.0;
                let targetLily = lilyPads[Math.floor(Math.random() * lilyPads.length)];
                eggClusters.push(new EggCluster(targetLily, this.primary, this.secondary, this.mateGenes.p, this.mateGenes.s));
                this.mateGenes = null;
            }

            updateBehavior() {
                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    let rand = Math.random();
                    if (rand < 0.6) { this.state = 'steady'; this.stateTimer = Math.random() * 300 + 200; } 
                    else if (rand < 0.85) { this.state = 'resting'; this.stateTimer = Math.random() * 150 + 50; } 
                    else { this.state = 'darting'; this.stateTimer = Math.random() * 50 + 30; }
                }
                if (this.state === 'steady') this.currentSpeedMult += (1.0 - this.currentSpeedMult) * 0.05; 
                else if (this.state === 'resting') this.currentSpeedMult += (0.2 - this.currentSpeedMult) * 0.05; 
                else if (this.state === 'darting') this.currentSpeedMult += (3.0 - this.currentSpeedMult) * 0.1; 
            }

            update() {
                if (this.size < this.targetSize) this.size += this.growthRate;
                if (this.isPregnant) { this.pregnancyFrames--; if (this.widthMultiplier < 1.6) this.widthMultiplier += 0.0005; if (this.pregnancyFrames <= 0) this.layEggs(); }
                if (draggedFish === this) { this.swimCycle += 0.8; this.finCycle += 0.5; this.draw(true); return; }
                
                this.updateBehavior();
                let targetX = this.x + Math.cos(this.angle) * 50, targetY = this.y + Math.sin(this.angle) * 50, hasFood = false;
                
                if (foods.length > 0) {
                    let closestFood = null, minDist = Infinity;
                    foods.forEach(f => { let d = Math.hypot(f.x - this.x, f.y - this.y); if (d < minDist) { minDist = d; closestFood = f; } });
                    if (closestFood) { targetX = closestFood.x; targetY = closestFood.y; hasFood = true; this.state = 'darting'; if (minDist < 15) foods.splice(foods.indexOf(closestFood), 1); }
                }
                
                let angleTo = Math.atan2(targetY - this.y, targetX - this.x);
                let diff = Math.atan2(Math.sin(angleTo - this.angle), Math.cos(angleTo - this.angle));
                this.angle += diff * (hasFood ? 0.08 : 0.02); 
                
                let finalSpeed = this.baseSpeed * this.currentSpeedMult;
                if (this.size < 0.4) finalSpeed *= 1.3; if (this.isPregnant) finalSpeed *= 0.6; 
                this.x += Math.cos(this.angle) * finalSpeed; this.y += Math.sin(this.angle) * finalSpeed; this.swimCycle += finalSpeed * 0.1;
                
                if (this.state === 'resting') this.finCycle += 0.02; else if (this.state === 'steady') this.finCycle += 0.08; else this.finCycle = 0;
                if (this.x < -100) this.x = width + 100; if (this.x > width + 100) this.x = -100; if (this.y < -100) this.y = height + 100; if (this.y > height + 100) this.y = -100;
                this.draw(false);
            }

            draw(isDragged) {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                let currentScale = isDragged ? this.size * 1.2 : this.size; ctx.scale(currentScale, currentScale);
                let wiggle = Math.sin(this.swimCycle) * (this.state === 'darting' ? 2 : 5); 
                if (this.size < 0.4) wiggle = Math.sin(this.swimCycle * 1.5) * 5;
                let c1 = `rgb(${this.primary.r}, ${this.primary.g}, ${this.primary.b})`; let c2 = `rgb(${this.secondary.r}, ${this.secondary.g}, ${this.secondary.b})`;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.beginPath(); ctx.ellipse(isDragged ? -20 : -10, isDragged ? 25 : 15, 25, 10 * this.widthMultiplier, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-20, 0); ctx.quadraticCurveTo(-35, wiggle, -50, wiggle * 1.8); ctx.lineTo(-40, 0); ctx.fillStyle = c1; ctx.fill();
                
                ctx.fillStyle = `rgba(255, 255, 255, 0.5)`;
                let finAngle = this.state === 'darting' ? 0.8 : Math.sin(this.finCycle) * 0.3; 
                ctx.save(); ctx.translate(5, 7 * this.widthMultiplier); ctx.rotate(-finAngle); ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-15, 10, -25, 5); ctx.quadraticCurveTo(-15, -2, -5, -2); ctx.fill(); ctx.restore();
                ctx.save(); ctx.translate(5, -7 * this.widthMultiplier); ctx.rotate(finAngle); ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-15, -10, -25, -5); ctx.quadraticCurveTo(-15, 2, -5, 2); ctx.fill(); ctx.restore();

                ctx.fillStyle = c1; ctx.beginPath(); ctx.ellipse(0, 0, 25, 10 * this.widthMultiplier, 0, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = c2; ctx.beginPath(); ctx.arc(5, 0, 6, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(-10, -3 * this.widthMultiplier, 5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = c1; ctx.beginPath(); ctx.arc(20, 0, 6, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(22, -4, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(22, 4, 1.5, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }

        const orangeWhite = { p: {r: 255, g: 94, b: 0}, s: {r: 255, g: 255, b: 255} };
        const goldBlack = { p: {r: 255, g: 179, b: 0}, s: {r: 34, g: 34, b: 34} };
        const whiteRed = { p: {r: 238, g: 238, b: 238}, s: {r: 211, g: 47, b: 47} };
        fishes.push(new Koi(orangeWhite.p, orangeWhite.s)); fishes.push(new Koi(goldBlack.p, goldBlack.s)); fishes.push(new Koi(whiteRed.p, whiteRed.s)); fishes.push(new Koi(whiteRed.p, goldBlack.s)); 

        const modal = document.getElementById('breedModal');
        document.getElementById('btnBreedYes').addEventListener('click', () => { if (breedingParents) breedingParents.mother.makePregnant(breedingParents.father); closeModal(); });
        document.getElementById('btnBreedNo').addEventListener('click', closeModal);
        function closeModal() { modal.classList.remove('active'); setTimeout(() => { isModalOpen = false; breedingParents = null; }, 300); }

        // --- MOBILE FRIENDLY EVENTS (pointer events instead of mouse) ---
        window.addEventListener('pointerdown', (e) => {
            if (isModalOpen) return;
            if (e.target.closest('[data-tooltip]') || e.target.closest('.glass-panel') || e.target.closest('.mode-toggle') || e.target.closest('.help-btn')) return;

            mouseX = e.clientX; mouseY = e.clientY; 

            if (currentMode === 'interact') {
                let lilyCaught = null, fishCaught = null;
                for(let i = lilyPads.length - 1; i >= 0; i--) { if(Math.hypot(lilyPads[i].x - e.clientX, lilyPads[i].y - e.clientY) < lilyPads[i].size) { lilyCaught = lilyPads[i]; break; } }
                if(lilyCaught) { draggedLily = lilyCaught; return; }
                
                for(let fish of fishes) { if(Math.hypot(fish.x - e.clientX, fish.y - e.clientY) < 40 * fish.size) { fishCaught = fish; break; } }
                if(fishCaught) draggedFish = fishCaught; 
                else ripples.push({ x: e.clientX, y: e.clientY, radius: 5, alpha: 0.8 }); 
            } else if (currentMode === 'feed') {
                foods.push({ x: e.clientX, y: e.clientY, radius: 3, alpha: 1 }); ripples.push({ x: e.clientX, y: e.clientY, radius: 5, alpha: 0.8 }); 
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (isModalOpen) return;
            mouseX = e.clientX; mouseY = e.clientY; 
            
            if (draggedLily) { draggedLily.x = e.clientX; draggedLily.y = e.clientY; } 
            else if (draggedFish) { draggedFish.x = e.clientX; draggedFish.y = e.clientY; } 
            else if (Math.random() > 0.6 && !e.target.closest('[data-tooltip]') && !e.target.closest('.glass-panel') && !e.target.closest('.mode-toggle')) {
                ripples.push({ x: e.clientX, y: e.clientY, radius: 2, alpha: 0.3 });
            }
        });

        window.addEventListener('pointerup', (e) => {
            mouseX = -1000; mouseY = -1000; // Clear touch position so bugs calm down
            if (draggedFish && !isModalOpen && currentMode === 'interact') {
                let droppedOnFish = null;
                for (let fish of fishes) {
                    if (fish !== draggedFish && fish.size > 0.5 && draggedFish.size > 0.5 && !fish.isPregnant && !draggedFish.isPregnant) { 
                        if (Math.hypot(fish.x - draggedFish.x, fish.y - draggedFish.y) < 40 * fish.size) { droppedOnFish = fish; break; }
                    }
                }
                if (droppedOnFish) { breedingParents = { father: draggedFish, mother: droppedOnFish }; isModalOpen = true; modal.classList.add('active'); }
            }
            draggedFish = null; draggedLily = null; 
        });

        window.addEventListener('pointercancel', () => {
            mouseX = -1000; mouseY = -1000; draggedFish = null; draggedLily = null; 
        });

        function updateWeather() {
            rainTimer--;
            if (rainTimer <= 0) { isRaining = !isRaining; rainTimer = Math.random() * 2000 + 1000; }
            if (isRaining && rainIntensity < 1) rainIntensity += 0.005;
            if (!isRaining && rainIntensity > 0) rainIntensity -= 0.005;
            if (rainIntensity < 0) rainIntensity = 0;
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            updateWeather();

            for (let i = foods.length - 1; i >= 0; i--) { let f = foods[i]; f.alpha -= 0.002; ctx.fillStyle = `rgba(255, 200, 100, ${f.alpha})`; ctx.beginPath(); ctx.arc(f.x, f.y, f.radius, 0, Math.PI*2); ctx.fill(); if (f.alpha <= 0) foods.splice(i, 1); }
            for (let i = eggClusters.length - 1; i >= 0; i--) { eggClusters[i].draw(); if(eggClusters[i].update()) eggClusters.splice(i, 1); }
            fishes.forEach(fish => fish.update());
            
            if (rainIntensity > 0) {
                let numDropsToDraw = Math.floor(raindrops.length * rainIntensity);
                for(let i = 0; i < numDropsToDraw; i++) raindrops[i].update(), raindrops[i].draw();
            }

            for (let i = ripples.length - 1; i >= 0; i--) { let r = ripples[i]; r.radius += 0.8; r.alpha -= 0.01; if (r.alpha <= 0) ripples.splice(i, 1); else { ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2); ctx.strokeStyle = `rgba(150, 220, 210, ${r.alpha})`; ctx.lineWidth = 1.5; ctx.stroke(); } }
            bugs.forEach(bug => { bug.update(); bug.draw(); });

            lilyPads.forEach(pad => { 
                if (pad !== draggedLily) {
                    pad.x += pad.vx; pad.y += pad.vy; pad.angle += pad.vAngle;
                    if (pad.x < -100) pad.x = width + 100; if (pad.x > width + 100) pad.x = -100; if (pad.y < -100) pad.y = height + 100; if (pad.y > height + 100) pad.y = -100;
                }
                ctx.save(); ctx.translate(pad.x, pad.y); 
                let isDragged = (pad === draggedLily), currentScale = isDragged ? 1.1 : 1; ctx.scale(currentScale, currentScale); ctx.rotate(pad.angle); 
                let shadowOffset = isDragged ? 15 : 10; 
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(5, shadowOffset, pad.size, pad.notch, Math.PI * 2 - pad.notch); ctx.fill(); 
                ctx.fillStyle = '#2d5a4c'; ctx.beginPath(); ctx.arc(0, 0, pad.size, pad.notch, Math.PI * 2 - pad.notch); ctx.lineTo(0,0); ctx.fill(); 
                ctx.strokeStyle = '#3e7a68'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 0, pad.size - 5, pad.notch, Math.PI * 2 - pad.notch); ctx.stroke(); 
                ctx.restore(); 
            });
            requestAnimationFrame(animate);
        }animate();
    </script>
</body>
</html>
